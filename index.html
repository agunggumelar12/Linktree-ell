<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GUNG PRESET - Official (Full Screen Video)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Syncopate:wght@700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6e00ff; 
            --secondary: #00d4ff; 
            --rainbow: linear-gradient(90deg, #ff0000, #ff00ff, #00ffff, #00ff00, #ffff00, #ff0000);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Mencegah scroll */
        }

        /* --- VIDEO BACKGROUND FULL LAYAR TOTAL --- */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3;
            object-fit: cover; /* Ini kuncinya agar video full tanpa distorsi */
            filter: brightness(0.5); 
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.8) 100%);
        }

        .main-header {
            position: absolute; top: 30px; width: 100%; text-align: center;
            font-family: 'Syncopate', sans-serif; font-size: 11px;
            font-weight: 800; letter-spacing: 12px; z-index: 10;
            background: var(--rainbow);
            background-size: 400% auto; -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; animation: rainbowFlow 3s linear infinite;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        @keyframes rainbowFlow {
            0% { background-position: 0% center; }
            100% { background-position: 100% center; }
        }

        .main-container { width: 90%; max-width: 380px; z-index: 1; perspective: 1000px; }

        .card {
            position: relative; padding: 50px 30px; border-radius: 40px;
            background: transparent; 
            text-align: center; 
            animation: float 5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .glow-orbit {
            position: absolute; inset: -15%; z-index: -1;
            background: conic-gradient(from 0deg, transparent, var(--primary), transparent 30%, var(--secondary), transparent 60%, var(--primary), transparent);
            filter: blur(50px); animation: rotateGlow 6s linear infinite;
            opacity: 0.5;
        }

        @keyframes rotateGlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .content-wrap { position: relative; z-index: 2; }

        .profile-wrapper { 
            position: relative; width: 110px; height: 110px; margin: 0 auto 25px; 
            padding: 2px; border-radius: 50%;
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--primary));
            background-size: 200% auto;
            animation: fastNeonPulse 0.8s linear infinite, glowPulse 0.8s ease-in-out infinite alternate;
        }
        
        @keyframes fastNeonPulse {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        
        @keyframes glowPulse {
            0% { box-shadow: 0 0 10px rgba(110, 0, 255, 0.3), 0 0 20px rgba(0, 212, 255, 0.2); }
            100% { box-shadow: 0 0 25px rgba(110, 0, 255, 0.8), 0 0 50px rgba(0, 212, 255, 0.6); }
        }
        
        .profile-img {
            width: 100%; height: 100%; border-radius: 50%; overflow: hidden;
            border: 4px solid #000;
        }
        .profile-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .name { font-family: 'Space Grotesk', sans-serif; font-size: 24px; margin-bottom: 8px; font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        .bio { font-size: 11px; color: var(--secondary); margin-bottom: 35px; letter-spacing: 3px; font-weight: 600; text-shadow: 0 1px 5px rgba(0,0,0,0.5); }

        .link-box {
            position: relative; border-radius: 20px; 
            margin-bottom: 18px;
            display: block; text-decoration: none; color: #fff; transition: 0.4s;
            background: rgba(255,255,255,0.05); 
        }

        .link-box:hover {
            transform: scale(1.03);
            background: rgba(255,255,255,0.1); 
            box-shadow: 0 5px 20px rgba(110, 0, 255, 0.2); 
        }

        .btn-inner {
            padding: 18px 25px; border-radius: 20px;
            display: flex; align-items: center; justify-content: flex-start;
        }

        .link-box i { font-size: 20px; margin-right: 15px; color: var(--secondary); }
        .link-box span { font-weight: 600; font-size: 13px; letter-spacing: 1px; }

        .footer { margin-top: 30px; font-size: 9px; opacity: 0.7; letter-spacing: 4px; font-weight: 700; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }

        .music-player-ctrl {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; align-items: center;
            background: rgba(0, 0, 0, 0.5); 
            padding: 12px 24px; border-radius: 100px;
            cursor: pointer; transition: 0.4s;
        }
        
        .music-bars { display: flex; align-items: flex-end; gap: 4px; height: 18px; margin-right: 15px; }
        .bar { width: 3px; background: var(--secondary); border-radius: 2px; animation: bounce 1s ease-in-out infinite; }
        .bar:nth-child(2) { animation-delay: 0.2s; height: 100%; background: var(--primary); }
        .bar:nth-child(3) { animation-delay: 0.4s; height: 70%; }
        
        @keyframes bounce { 0%, 100% { height: 30%; } 50% { height: 100%; } }
        .music-player-ctrl.paused .bar { animation-play-state: paused; height: 30%; }
    </style>
</head>
<body onclick="startMusic()">

                <div class="profile-wrapper">
                    <div class="profile-img">
                        <img src="https://repgyetdcodkynrbxocg.supabase.co/storage/v1/object/public/images/telegram-1772368916232-e2c781ba.jpg" alt="ELL PRESET">
                    </div>
                </div>
                
                <h1 class="name">ELL PRESET</h1>
                <p class="bio">Premium Editor Visual</p>

                <div class="links">
                    <a href="https://wa.me/6283841035866" class="link-box">
                        <div class="btn-inner">
                            <i class="fab fa-whatsapp"></i>
                            <span>CS OFFICIAL 1</span>
                        </div>
                    </a>

                    <a href="https://wa.me/6282144697897" class="link-box">
                        <div class="btn-inner">
                            <i class="fab fa-whatsapp"></i>
                            <span>CS OFFICIAL 2</span>
                        </div>
                    </a>

                    <a href="https://www.tiktok.com/@gung_preset1" class="link-box">
                        <div class="btn-inner">
                            <i class="fab fa-tiktok"></i>
                            <span>TIKTOK COMMUNITY</span>
                        </div>
                    </a>
                </div>

                <div class="footer">ELL PRESET PROJECT • 2026</div>
            </div>
        </div>
    </div>

    <audio id="myAudio" loop>
        <source src="terimeri.mp3" type="audio/mpeg">
    </audio>

    <div class="music-player-ctrl paused" id="musicCtrl" onclick="toggleMusic(event)">
        <div class="music-bars">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <i class="fas fa-play" id="musicIcon"></i>
        <span style="font-size: 10px; font-weight: 800; margin-left: 10px; letter-spacing: 1px; color: #fff; text-shadow: 0 1px 3px #000;">LISTEN</span>
    </div>

    <script>
        const audio = document.getElementById("myAudio");
        const musicCtrl = document.getElementById("musicCtrl");
        const musicIcon = document.getElementById("musicIcon");

        function startMusic() {
            if (audio.paused) { playAudio(); }
        }

        function toggleMusic(event) {
            event.stopPropagation();
            if (audio.paused) { playAudio(); } else { pauseAudio(); }
        }

        function playAudio() {
            audio.play().catch(e => console.log("User interaction required"));
            musicCtrl.classList.remove("paused");
            musicIcon.classList.replace("fa-play", "fa-pause");
        }

        function pauseAudio() {
            audio.pause();
            musicCtrl.classList.add("paused");
            musicIcon.classList.replace("fa-pause", "fa-play");
        }
        
        window.addEventListener('load', () => {
            const v = document.getElementById("bgVideo");
            v.play().catch(() => {});
        });
    </script>
</body>
</html>
